name: Build VPK and Deploy Pages

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  VITASDK: /home/runner/vitasdk-softfp
  VITASDK_CACHE_KEY: vitasdk-softfp-2026-05a

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential git curl xz-utils python3

      - name: Cache VitaSDK
        id: cache-vitasdk
        uses: actions/cache@v4
        with:
          path: ${{ env.VITASDK }}
          key: ${{ env.VITASDK_CACHE_KEY }}

      - name: Install VitaSDK-softfp
        if: steps.cache-vitasdk.outputs.cache-hit != 'true'
        run: |
          rm -rf "$VITASDK"
          git clone --depth 1 https://github.com/vitasdk-softfp/vdpm /tmp/vdpm
          cd /tmp/vdpm
          ./bootstrap-vitasdk.sh
          ./install-all.sh

      - name: Add VitaSDK to PATH
        run: echo "$VITASDK/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DSTANDALONE_DEMO=OFF

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Stage Pages site
        run: |
          mkdir -p _site
          cp -r docs/. _site/
          cp build/superhexagon_vita.vpk _site/superhexagon_vita.vpk

      - name: Upload VPK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: superhexagon-vpk
          path: build/superhexagon_vita.vpk
          if-no-files-found: error

      - name: Upload Pages artifact
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
